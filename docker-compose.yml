# Self-hosted PullPilot. Two modes:
#
#   docker compose up --build
#       Web UI on http://localhost:5000. The static engine works immediately,
#       fully offline. LLM engines use whatever keys you export.
#
#   docker compose --profile llm up --build
#       Also starts a bundled Ollama, so LLM reviews run on your own hardware
#       and code never leaves the box. Pull a model once:
#           docker compose exec ollama ollama pull llama3.2:3b
#       then pick the "selfhosted" (or "ollama") engine in the UI.
services:
  pullpilot:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # Route both local-LLM engines at the bundled Ollama service.
      - SELFHOSTED_BASE_URL=${SELFHOSTED_BASE_URL:-http://ollama:11434/api/generate}
      - SELFHOSTED_MODEL=${SELFHOSTED_MODEL:-llama3.2:3b}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      # Optional: pass through from the host environment.
      - GITHUB_TOKEN
      - GITHUB_API_URL
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - GROQ_API_KEY
      - OPENROUTER_API_KEY
    volumes:
      - pullpilot-data:/app/data   # review history + benchmark results persist

  ollama:
    image: ollama/ollama
    profiles: ["llm"]
    volumes:
      - ollama-models:/root/.ollama

volumes:
  pullpilot-data:
  ollama-models:
